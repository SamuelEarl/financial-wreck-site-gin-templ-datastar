#:schema https://json.schemastore.org/any.json

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main"
  cmd = "go tool templ generate && go build -o ./tmp/main ."
  delay = 500
  entrypoint = ["./tmp/main"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go", ".*_templ.go"]
  exclude_unchanged = false
  follow_symlink = false
  # If your `cmd` builds a file called `./tmp/main`, your `full_bin` must point to that same file. If they don't match, Air might try to run an old version of your code or a file that doesn't exist.
  full_bin = "./tmp/main"
  include_dir = ["views", "routes", "static", "internal"]
  include_ext = ["go", "tpl", "tmpl", "html", "templ", "assets", "tmp", "vendor", "testdata", "node_modules"]
  include_file = []
  kill_delay = "1000ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  # send_interrupt = true allows your Gin server to shut down gracefully, allowing your app to close database connections or finish writing a file before it exits. This prevents "zombie processes" that might keep your port (:8080) occupied.
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  enabled = true
  proxy_port = 4040
  app_port = 8080

[screen]
  clear_on_rebuild = true
  keep_scroll = true
